apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-stack-frontend
  namespace: demo-stack-staging
  labels:
    app: demo-stack-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-stack-frontend
  template:
    metadata:
      labels:
        app: demo-stack-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/jvkassi/simple-html-app-frontend:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-stack-frontend
  namespace: demo-stack-staging
  labels:
    app: demo-stack-frontend
spec:
  selector:
    app: demo-stack-frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-stack
  namespace: demo-stack-staging
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  rules:
    - host: demo-stack.k8s.abj.smile.ci
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: demo-stack-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-stack-frontend
                port:
                  number: 8080
