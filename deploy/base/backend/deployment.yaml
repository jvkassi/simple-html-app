apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-stack-backend
  namespace: demo-stack-staging
  labels:
    app: demo-stack-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-stack-backend
  template:
    metadata:
      labels:
        app: demo-stack-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/jvkassi/simple-html-app-backend:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: demo-stack-postgres-app
                  key: uri
            - name: REDIS_ADDR
              value: demo-stack-redis.demo-stack-staging.svc.cluster.local:6379
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-stack-backend
  namespace: demo-stack-staging
  labels:
    app: demo-stack-backend
spec:
  selector:
    app: demo-stack-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: demo-stack-backend
  namespace: demo-stack-staging
  labels:
    app.kubernetes.io/part-of: demo-stack
spec:
  selector:
    matchLabels:
      app: demo-stack-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
