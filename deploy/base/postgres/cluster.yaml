# Requires the CloudNativePG operator (already installed fleet-wide — see
# cnpg_* metrics in the VictoriaMetrics catalog).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: demo-stack-postgres
  namespace: demo-stack-staging
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  storage:
    size: 2Gi
  bootstrap:
    initdb:
      database: notes
      owner: notes
  monitoring:
    # Auto-creates a PodMonitor, converted to a VMPodScrape by the fleet's
    # prometheus-operator-CRD converter — this is how cnpg_* metrics show up
    # in VictoriaMetrics without any extra ServiceMonitor.
    enablePodMonitor: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
