apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend2
  namespace: demo-stack-staging
  labels:
    app: frontend2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend2
  template:
    metadata:
      labels:
        app: frontend2
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: frontend2
          image: ghcr.io/jvkassi/simple-html-app-frontend2:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend2
  namespace: demo-stack-staging
  labels:
    app: frontend2
spec:
  selector:
    app: frontend2
  ports:
    - name: http
      port: 8080
      targetPort: http
