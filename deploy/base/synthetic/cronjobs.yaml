apiVersion: batch/v1
kind: CronJob
metadata:
  name: synthetic-api-test
  namespace: demo-stack-staging
  labels:
    app: synthetic-api-test
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 90
      template:
        metadata:
          labels:
            app: synthetic-api-test
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: api-test
              image: ghcr.io/jvkassi/simple-html-app-api-test:latest
              env:
                - name: K6_PROMETHEUS_RW_SERVER_URL
                  value: http://vmsingle-vmks.victoria-metrics.svc.cluster.local:8428/api/v1/write
                - name: K6_PROMETHEUS_RW_TREND_STATS
                  value: "p(95),p(99),min,max"
              args:
                - "-o"
                - "experimental-prometheus-rw"
                - "--tag"
                - "check_type=api"
                - "--tag"
                - "namespace=demo-stack-staging"
                - "--tag"
                - "env=staging"
                - "--tag"
                - "proj=demo-stack"
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
---
