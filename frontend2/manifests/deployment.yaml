apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend2
  namespace: demo-stack-staging
  labels:
    app: frontend2
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend2
  template:
    metadata:
      labels:
        app: frontend2
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: frontend2
          image: ghcr.io/jvkassi/simple-html-app-frontend2:latest
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend2
  namespace: demo-stack-staging
  labels:
    app: frontend2
spec:
  selector:
    app: frontend2
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-stack-frontend2
  namespace: demo-stack-staging
spec:
  ingressClassName: traefik
  rules:
    - host: demo-stack.k8s.abj.smile.ci
      http:
        paths:
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: frontend2
                port:
                  number: 8080
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: synthetic-e2e2-test
  namespace: demo-stack-staging
  labels:
    app: synthetic-e2e2-test
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 240
      template:
        metadata:
          labels:
            app: synthetic-e2e2-test
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: e2e2-test
              image: ghcr.io/jvkassi/simple-html-app-e2e2-test:latest
              env:
                - name: BASE_URL
                  value: https://demo-stack.k8s.abj.smile.ci
                - name: K6_BROWSER_HEADLESS
                  value: "true"
                - name: K6_PROMETHEUS_RW_SERVER_URL
                  value: http://vmsingle-vmks.victoria-metrics.svc.cluster.local:8428/api/v1/write
                - name: K6_PROMETHEUS_RW_TREND_STATS
                  value: "p(95),p(99),min,max"
              args:
                - "-o"
                - "experimental-prometheus-rw"
                - "--tag"
                - "check_type=e2e2"
                - "--tag"
                - "namespace=demo-stack-staging"
                - "--tag"
                - "env=staging"
                - "--tag"
                - "proj=demo-stack"
              resources:
                requests:
                  cpu: 50m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
