<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes — Dark UI</title>
    <style>
        :root { color-scheme: dark; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f1117; color: #e6e6e6; margin: 0; padding: 40px 16px;
        }
        main { max-width: 560px; margin: 0 auto; }
        h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
        p.subtitle { color: #8b8fa3; margin-top: 0; }
        form { display: flex; gap: 8px; margin: 24px 0; }
        input[type="text"] {
            flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #2a2d3a;
            background: #171a23; color: #e6e6e6; font-size: 0.95rem;
        }
        button {
            padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer;
            background: #5b6cf7; color: white; font-weight: 600;
        }
        button:hover { background: #4a5ae0; }
        #note-cards { display: flex; flex-direction: column; gap: 10px; }
        .note-card {
            background: #171a23; border: 1px solid #2a2d3a; border-radius: 10px;
            padding: 14px 16px;
        }
        .note-card .note-id { color: #5b6cf7; font-weight: 600; margin-right: 6px; }
        #status-bar { color: #8b8fa3; font-size: 0.85rem; margin-bottom: 16px; }
    </style>
</head>
<body>
    <main>
        <h1>Notes</h1>
        <p class="subtitle">Alternate UI — same backend, Postgres + Redis</p>

        <form id="create-note-form">
            <input id="note-text" type="text" placeholder="What's on your mind?" required>
            <button type="submit">Save</button>
        </form>

        <p id="status-bar"></p>
        <div id="note-cards"></div>
    </main>

    <script>
        const API_BASE = '/api';
        const cards = document.getElementById('note-cards');
        const statusBar = document.getElementById('status-bar');

        async function loadNotes() {
            statusBar.textContent = 'Loading...';
            try {
                const res = await fetch(`${API_BASE}/notes`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const notes = await res.json();
                cards.innerHTML = '';
                notes.forEach(n => {
                    const card = document.createElement('div');
                    card.className = 'note-card';
                    card.innerHTML = `<span class="note-id">#${n.id}</span>${n.body}`;
                    cards.appendChild(card);
                });
                statusBar.textContent = `${notes.length} note(s)`;
            } catch (err) {
                statusBar.textContent = `Backend unavailable: ${err.message}`;
            }
        }

        document.getElementById('create-note-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('note-text');
            const body = input.value.trim();
            if (!body) return;
            try {
                const res = await fetch(`${API_BASE}/notes`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ body }),
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                input.value = '';
                await loadNotes();
            } catch (err) {
                statusBar.textContent = `Failed to save note: ${err.message}`;
            }
        });

        loadNotes();
    </script>
</body>
</html>
