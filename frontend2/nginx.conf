server {
    listen 8080;
    server_tokens off;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Served under the /v2 path prefix (Traefik forwards the full path,
    # no rewrite) — alias + SPA fallback so /v2/anything still resolves
    # to index.html.
    location = /v2 {
        return 301 /v2/;
    }

    location /v2/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }
}
