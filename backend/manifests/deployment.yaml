apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: demo-stack-staging
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: backend
          image: ghcr.io/jvkassi/simple-html-app-backend:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-app
                  key: uri
            - name: REDIS_ADDR
              value: redis.demo-stack-staging.svc.cluster.local:6379
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-auth
                  key: password
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: demo-stack-staging
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend
  namespace: demo-stack-staging
spec:
  selector:
    matchLabels:
      app: backend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: synthetic-api-test
  namespace: demo-stack-staging
  labels:
    app: synthetic-api-test
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 60
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 90
      template:
        metadata:
          labels:
            app: synthetic-api-test
        spec:
          restartPolicy: Never
          imagePullSecrets:
            - name: ghcr-pull
          containers:
            - name: api-test
              image: ghcr.io/jvkassi/simple-html-app-api-test:latest
              env:
                - name: K6_PROMETHEUS_RW_SERVER_URL
                  value: http://vmsingle-vmks.victoria-metrics.svc.cluster.local:8428/api/v1/write
                - name: K6_PROMETHEUS_RW_TREND_STATS
                  value: "p(95),p(99),min,max"
              args:
                - "-o"
                - "experimental-prometheus-rw"
                - "--tag"
                - "check_type=api"
                - "--tag"
                - "namespace=demo-stack-staging"
                - "--tag"
                - "env=staging"
                - "--tag"
                - "proj=demo-stack"
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
