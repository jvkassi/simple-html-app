# Matches this fleet's convention (confirmed live on cmi-backend-production,
# lycoris-development, etc.): Redis CR named "redis", auth via a redis-auth
# Secret (key "password"), redisExporter enabled on port 9121 named
# "redis-exporter", scraped by a ServiceMonitor selecting app=redis.
#
# The password below is a generated placeholder committed directly to git,
# matching how the rest of this fleet does it today (no sealed-secrets/
# external-secrets operator is installed on this cluster) — rotate it if
# this repo's visibility or threat model changes.
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
  namespace: demo-stack-staging
type: Opaque
stringData:
  password: "Y1748pp6FDb8DEh48Pv9Ka2_gmuvPZSx"
---
apiVersion: redis.redis.opstreelabs.in/v1beta2
kind: Redis
metadata:
  name: redis
  namespace: demo-stack-staging
spec:
  kubernetesConfig:
    image: quay.io/opstree/redis:latest
    imagePullPolicy: IfNotPresent
    redisSecret:
      name: redis-auth
      key: password
  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
  storage:
    volumeClaimTemplate:
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
  redisExporter:
    enabled: true
    image: quay.io/opstree/redis-exporter:v1.44.0
    imagePullPolicy: Always
    port: 9121
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter
  namespace: demo-stack-staging
spec:
  selector:
    matchLabels:
      app: redis
  endpoints:
    - port: redis-exporter
      path: /metrics
      interval: 30s
