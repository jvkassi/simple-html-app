name: Build and push images

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "frontend/**"
      - "frontend2/**"
      - "backend/**"
      - "api/**"
      - "e2e/**"
      - "e2e2/**"
      - "package.json"
      - "openapitools.json"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - component: frontend
            context: frontend
            dockerfile: frontend/Dockerfile
          - component: frontend2
            context: frontend2
            dockerfile: frontend2/Dockerfile
          - component: backend
            context: backend
            dockerfile: backend/Dockerfile
          - component: api-test
            context: .
            dockerfile: /tmp/api-test.Dockerfile
          - component: e2e-test
            context: .
            dockerfile: /tmp/e2e-test.Dockerfile
          - component: e2e2-test
            context: .
            dockerfile: /tmp/e2e2-test.Dockerfile
    steps:
      - uses: actions/checkout@v4

      # api/ and e2e/ are just test assets (OpenAPI spec / declarative JSON
      # scenarios) — the Dockerfile that packages them into a runnable k6
      # image is pipeline plumbing, not app source, so it's generated here
      # instead of living as a committed file.
      - name: Write api-test Dockerfile
        if: matrix.component == 'api-test'
        run: |
          cat > /tmp/api-test.Dockerfile <<'EOF'
          FROM node:20-alpine AS generator
          RUN apk add --no-cache openjdk17-jre
          WORKDIR /gen
          COPY api/openapi.yaml openapitools.json ./
          RUN npx --yes @openapitools/openapi-generator-cli generate -i openapi.yaml -g k6 -o generated

          FROM grafana/k6:2.1.0
          COPY --from=generator /gen/generated/script.js /scripts/script.js
          ENTRYPOINT ["k6", "run", "/scripts/script.js"]
          EOF

      - name: Write e2e-test Dockerfile
        if: matrix.component == 'e2e-test'
        run: |
          cat > /tmp/e2e-test.Dockerfile <<'EOF'
          FROM grafana/k6:2.1.0-with-browser
          COPY e2e/ /e2e/
          WORKDIR /e2e
          ENTRYPOINT ["k6", "run", "test.js"]
          EOF

      # e2e2's test.js imports the shared runner from ../e2e/lib/ (no
      # duplicated copy of runner.js) — both dirs get copied so that
      # relative import resolves the same way it does when run locally
      # from the repo root.
      - name: Write e2e2-test Dockerfile
        if: matrix.component == 'e2e2-test'
        run: |
          cat > /tmp/e2e2-test.Dockerfile <<'EOF'
          FROM grafana/k6:2.1.0-with-browser
          COPY e2e/lib/ /e2e/lib/
          COPY e2e2/ /e2e2/
          WORKDIR /e2e2
          ENTRYPOINT ["k6", "run", "test.js"]
          EOF

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/simple-html-app-${{ matrix.component }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Runs the same k6 test images the CronJobs use, but right here on push —
  # against the live public ingress — so a broken frontend/backend shows up
  # as a failed check on the commit instead of waiting for the next 2min tick.
  smoke-test:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://demo-stack.k8s.abj.smile.ci
      OWNER: ${{ github.repository_owner }}
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for frontend (/) to be live
        run: |
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "$BASE_URL/" || true)
            [ "$code" = "200" ] && { echo "frontend is live"; exit 0; }
            echo "waiting for / (attempt $i/30, got $code)..."
            sleep 10
          done
          echo "::error::frontend (/) never became reachable after 5 minutes"
          exit 1

      - name: Wait for frontend2 (/v2/) to be live
        run: |
          for i in $(seq 1 30); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' "$BASE_URL/v2/" || true)
            [ "$code" = "200" ] && { echo "frontend2 is live"; exit 0; }
            echo "waiting for /v2/ (attempt $i/30, got $code)..."
            sleep 10
          done
          echo "::error::frontend2 (/v2/) never became reachable after 5 minutes"
          exit 1

      - name: Run API synthetic test
        run: docker run --rm ghcr.io/$OWNER/simple-html-app-api-test:latest

      - name: Run E2E test (frontend)
        run: docker run --rm -e BASE_URL="$BASE_URL" -e K6_BROWSER_HEADLESS=true ghcr.io/$OWNER/simple-html-app-e2e-test:latest

      - name: Run E2E test (frontend2)
        run: docker run --rm -e BASE_URL="$BASE_URL" -e K6_BROWSER_HEADLESS=true ghcr.io/$OWNER/simple-html-app-e2e2-test:latest
