# Matches this fleet's convention (confirmed live via kubectl against
# bank-projects-development etc.): Cluster named "postgresql" per namespace,
# imageCatalogRef against the shared postgresql-system-trixie catalog rather
# than a raw imageName.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgresql
  namespace: demo-stack-staging
spec:
  instances: 1
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    name: postgresql-system-trixie
    major: 16
  storage:
    size: 2Gi
  bootstrap:
    initdb:
      database: notes
      owner: notes
  monitoring:
    # Auto-creates a PodMonitor, converted to a VMPodScrape by the fleet's
    # prometheus-operator-CRD converter — this is how cnpg_* metrics show up
    # in VictoriaMetrics without any extra ServiceMonitor.
    enablePodMonitor: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
